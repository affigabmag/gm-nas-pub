<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>gm-nas · WiFi Setup</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --fg: #f1f5f9;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent-fg: #04263a;
      --border: #334155;
      --danger: #f87171;
      --ok: #4ade80;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: env(safe-area-inset-top, 16px) 16px 32px;
    }
    .wrap { width: 100%; max-width: 420px; }
    header { text-align: center; margin: 28px 0 20px; }
    .logo {
      width: 56px; height: 56px; margin: 0 auto 12px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), #6366f1);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; font-weight: 700; color: var(--accent-fg);
    }
    h1 { font-size: 20px; margin: 0 0 4px; }
    .sub { color: var(--muted); font-size: 14px; margin: 0; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-top: 18px;
    }
    .steps { list-style: none; padding: 0; margin: 0 0 18px; }
    .steps li {
      display: flex; gap: 10px; align-items: flex-start;
      font-size: 14px; color: var(--muted); margin-bottom: 8px;
    }
    .steps .n {
      flex: none; width: 22px; height: 22px; border-radius: 50%;
      background: var(--accent); color: var(--accent-fg);
      font-size: 12px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }
    label { display: block; font-size: 13px; color: var(--muted); margin: 14px 0 6px; }
    select, input, button {
      width: 100%; font-size: 16px; border-radius: 10px;
      border: 1px solid var(--border); padding: 12px;
      background: #0b1220; color: var(--fg);
    }
    select:focus, input:focus { outline: 2px solid var(--accent); border-color: transparent; }
    .row-refresh { display: flex; gap: 8px; align-items: center; }
    .row-refresh select { flex: 1; }
    .icon-btn {
      flex: none; width: 46px; padding: 0; height: 46px;
      background: #0b1220; cursor: pointer; font-size: 18px;
    }
    button.primary {
      margin-top: 18px; background: var(--accent); color: var(--accent-fg);
      font-weight: 700; border: none; cursor: pointer; padding: 14px;
    }
    button.primary:disabled { opacity: .5; cursor: not-allowed; }
    .msg { margin-top: 14px; font-size: 14px; text-align: center; min-height: 20px; }
    .msg.err { color: var(--danger); }
    .msg.ok { color: var(--ok); }
    .hint { font-size: 12px; color: var(--muted); margin-top: 6px; }
    .pass-wrap { position: relative; }
    .pass-wrap input { padding-right: 46px; width: 100%; }
    .eye {
      position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
      width: auto; margin: 0; background: none; border: none; cursor: pointer;
      font-size: 18px; padding: 6px 8px; line-height: 1; opacity: .7;
    }
    .eye:hover { opacity: 1; }
    .eye.on { opacity: 1; }
    .ver { text-align: center; color: var(--muted); font-size: 11px; margin-top: 18px; }
    .spinner {
      display: inline-block; width: 16px; height: 16px; vertical-align: -3px;
      border: 2px solid var(--muted); border-top-color: var(--accent);
      border-radius: 50%; animation: spin .8s linear infinite; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (prefers-color-scheme: light) {
      :root { --bg:#f1f5f9; --card:#ffffff; --fg:#0f172a; --muted:#64748b; --border:#e2e8f0; }
      select, input, .icon-btn { background:#f8fafc; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="logo"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#04263a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="7" rx="1.5"/><rect x="3" y="13" width="18" height="7" rx="1.5"/><circle cx="6.6" cy="7.5" r="0.9" fill="#04263a" stroke="none"/><circle cx="6.6" cy="16.5" r="0.9" fill="#04263a" stroke="none"/><line x1="9.5" y1="7.5" x2="17.5" y2="7.5"/><line x1="9.5" y1="16.5" x2="17.5" y2="16.5"/></svg></div>
      <h1>Set up your gm-nas</h1>
      <p class="sub">Connect your device to your home WiFi</p>
    </header>

    <div class="card">
      <ol class="steps">
        <li><span class="n">1</span><span>Pick your home WiFi network below.</span></li>
        <li><span class="n">2</span><span>Enter that network's password.</span></li>
        <li><span class="n">3</span><span>Tap Connect — this setup network then turns off.</span></li>
      </ol>

      <form id="form">
        <label for="ssid">Home WiFi network</label>
        <div class="row-refresh">
          <select id="ssid" name="ssid" required>
            <option value="" disabled selected>Scanning for networks…</option>
          </select>
          <button type="button" id="refresh" class="icon-btn" title="Rescan">↻</button>
        </div>

        <div id="manualWrap" style="display:none">
          <label for="manualSsid">Network name</label>
          <input id="manualSsid" type="text" placeholder="Type the WiFi name" autocapitalize="none" />
        </div>

        <label for="pass">WiFi password</label>
        <div class="pass-wrap">
          <input id="pass" name="passphrase" type="password" placeholder="Your home WiFi password"
                 autocapitalize="none" autocomplete="off" />
          <button type="button" id="togglePass" class="eye" title="Show password"
                  aria-label="Show password">👁</button>
        </div>
        <div class="hint">Leave blank only for an open network.</div>

        <button type="submit" id="submit" class="primary">Connect</button>
      </form>

      <div id="msg" class="msg"></div>
    </div>
    <div class="ver">gm-nas setup &bull; v01.45.20260719093727</div>
  </div>

  <script>
    var ssidSel   = document.getElementById('ssid');
    var manualWrap= document.getElementById('manualWrap');
    var manualSsid= document.getElementById('manualSsid');
    var passInput = document.getElementById('pass');
    var togglePass= document.getElementById('togglePass');
    togglePass.addEventListener('click', function () {
      var show = passInput.type === 'password';
      passInput.type = show ? 'text' : 'password';
      togglePass.classList.toggle('on', show);
      togglePass.title = show ? 'Hide password' : 'Show password';
    });
    var form      = document.getElementById('form');
    var submitBtn = document.getElementById('submit');
    var refreshBtn= document.getElementById('refresh');
    var msg       = document.getElementById('msg');

    var MANUAL = '__manual__';

    function setMsg(text, cls) {
      msg.className = 'msg' + (cls ? ' ' + cls : '');
      msg.innerHTML = text;
    }

    // wifi-connect returns /networks as an array; items may be strings
    // or objects ({ssid: "..."}). Handle both.
    function ssidOf(item) {
      if (typeof item === 'string') return item;
      if (item && typeof item === 'object') return item.ssid || item.SSID || '';
      return '';
    }

    function loadNetworks() {
      ssidSel.innerHTML = '<option value="" disabled selected>Scanning for networks…</option>';
      fetch('/networks')
        .then(function (r) { return r.json(); })
        .then(function (list) {
          var seen = {}, names = [];
          (list || []).forEach(function (it) {
            var s = ssidOf(it);
            if (s && !seen[s]) { seen[s] = 1; names.push(s); }
          });
          names.sort(function (a, b) { return a.localeCompare(b); });

          ssidSel.innerHTML = '';
          var ph = document.createElement('option');
          ph.value = ''; ph.disabled = true; ph.selected = true;
          ph.textContent = names.length ? 'Select your network' : 'No networks found — rescan';
          ssidSel.appendChild(ph);

          names.forEach(function (s) {
            var o = document.createElement('option');
            o.value = s; o.textContent = s;
            ssidSel.appendChild(o);
          });

          var m = document.createElement('option');
          m.value = MANUAL; m.textContent = 'Other / hidden network…';
          ssidSel.appendChild(m);
        })
        .catch(function () {
          setMsg('Could not scan networks. Tap ↻ to retry.', 'err');
        });
    }

    ssidSel.addEventListener('change', function () {
      var manual = ssidSel.value === MANUAL;
      manualWrap.style.display = manual ? 'block' : 'none';
      if (manual) manualSsid.focus();
    });

    refreshBtn.addEventListener('click', function () { setMsg(''); loadNetworks(); });

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      var ssid = ssidSel.value === MANUAL ? manualSsid.value.trim() : ssidSel.value;
      if (!ssid) { setMsg('Please choose a network.', 'err'); return; }

      var card = document.querySelector('.card');
      function panel(html) { card.innerHTML = html; }

      // Step 1 — preloader while the device joins the network.
      panel(
        '<div style="text-align:center;padding:14px 4px">' +
          '<div class="spinner" style="width:36px;height:36px;border-width:3px;margin:6px auto 16px"></div>' +
          '<div style="font-size:16px;font-weight:500;margin-bottom:6px">Connecting to <b>' + ssid + '</b>…</div>' +
          '<div class="hint">Keep this page open for a moment.</div>' +
        '</div>'
      );

      // wifi-connect's /connect endpoint REQUIRES an 'identity' param (empty
      // for WPA-PSK; only used for WPA-Enterprise). Omitting it makes the
      // server reject with "'identity' not found" and no profile is saved.
      var body = 'ssid=' + encodeURIComponent(ssid) +
                 '&identity=' +
                 '&passphrase=' + encodeURIComponent(passInput.value);

      // Fire the request. wifi-connect shuts the AP off the instant it succeeds,
      // so the reply usually never comes back — we don't wait on it.
      fetch('/connect', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: body
      }).catch(function () {});

      // Step 2 — after a short wait, show the done screen + a 2-minute
      // restart countdown (the gm-nas reboots and comes up on the new WiFi).
      setTimeout(function () {
        panel(
          '<div style="text-align:center;padding:8px 4px">' +
            '<div style="width:54px;height:54px;border-radius:50%;background:var(--ok);color:#04331b;' +
                 'display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 14px">✓</div>' +
            '<div style="font-size:18px;font-weight:500;margin-bottom:10px">Setup complete</div>' +
            '<div style="color:var(--muted);font-size:14px;line-height:1.7">' +
              'Your gm-nas is joining <b style="color:var(--fg)">' + ssid + '</b> and is <b style="color:var(--fg)">restarting now</b>.<br><br>' +
              'The <b style="color:var(--fg)">GMNas-Setup</b> network switches off — ' +
              'reconnect your phone to your <b style="color:var(--fg)">home WiFi</b>.<br>' +
              'Then find your gm-nas at <b style="color:var(--fg)">my-gmnas.local</b>.' +
            '</div>' +
            '<div id="cd" style="margin-top:18px;font-size:26px;font-weight:700;color:var(--accent)">Restarting… 4:00</div>' +
            '<div style="color:var(--muted);font-size:12px;margin-top:12px">' +
              'Already back on home WiFi? Skip the wait:</div>' +
            '<a id="openbtn" href="http://my-gmnas.local" ' +
               'style="display:block;margin-top:8px;background:var(--ok);color:#04331b;font-weight:700;' +
                      'text-decoration:none;border-radius:10px;padding:14px;font-size:16px">Go to home ↗</a>' +
          '</div>'
        );
        var left = 240, el = document.getElementById('cd');
        var openbtn = document.getElementById('openbtn');
        var iv = setInterval(function () {
          left--;
          if (left <= 0) {
            clearInterval(iv);
            el.style.color = 'var(--ok)';
            el.innerHTML = 'Ready! Reconnect your phone to home WiFi, then:';
            openbtn.style.display = 'block';
            // Auto-open the welcome app (works once the phone is back on home WiFi).
            setTimeout(function () { window.location.href = 'http://my-gmnas.local'; }, 2000);
            return;
          }
          var m = Math.floor(left / 60), s = left % 60;
          el.textContent = 'Restarting… ' + m + ':' + (s < 10 ? '0' : '') + s;
        }, 1000);
      }, 6000);
    });

    loadNetworks();
  </script>
</body>
</html>
